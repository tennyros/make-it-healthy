  server:
    port: 8008
  spring:
    application:
      name: make-it-healthy
    datasource:
      driver-class-name: org.postgresql.Driver
    jpa:
      open-in-view: false
      show-sql: true
      properties:
        hibernate:
          format_sql: true
      hibernate:
        ddl-auto: none
    liquibase:
      enabled: true
      change-log: classpath:/db/changelog/db.changelog-master.yaml